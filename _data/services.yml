- title: Firearms Sales
  icon: icon-revolver
  description: We carry a wide selection of new and used handguns, rifles, and shotguns. Whether you're looking for a home-defense pistol, a hunting rifle, or a tactical shotgun, we can help you find the right fit.

- title: FFL Transfers
  icon: icon-target
  description: As a licensed FFL dealer (#709824909), we can receive firearms purchased online and shipped from other dealers. We handle the required paperwork and background check so the process is smooth and legal. Call us to coordinate your transfer before shipping.

- title: Gunsmithing
  icon: icon-target-2
  description: From routine cleaning and maintenance to repairs and custom modifications, our gunsmiths treat every firearm with expert care. Bring in your firearm for a consultation and we'll get it running right.

- title: Ammunition
  icon: icon-bullet-3
  description: We stock pistol, rifle, and shotgun ammunition in popular calibers. Whether you need practice rounds or self-defense loads, we carry reliable brands at competitive prices.

- title: Optics & Accessories
  icon: icon-paintball
  description: Scopes, red dots, holsters, slings, magazines, cleaning kits, and tactical gear. We carry accessories to help you get the most out of your firearm.

- title: Layaway Available
  icon: icon-bulletproof-vest-2
  description: Want to hold a firearm while you save up? Ask us about our layaway program. We want to make it easy for you to get the firearm you want.
