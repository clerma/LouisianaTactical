{% assign hero_bg = page.hero_bg | default: '/assets/images/latact/486726891_978317624491309_6475241287826585450_n.jpg' %}
<div class="vc_row wpb_row vc_row-fluid vc_row-has-fill shape_divider_top-none shape_divider_bottom-none sc_layouts_row sc_layouts_row_type_normal scheme_dark la-page-hero"
     style="background-image: url('{{ hero_bg }}'); background-size: cover; background-position: center center; position: relative;">
    <div class="la-page-hero-overlay"></div>
    <div class="wpb_column vc_column_container vc_col-sm-12 sc_layouts_column sc_layouts_column_align_center sc_layouts_column_icons_position_left" style="position: relative; z-index: 1;">
        <div class="vc_column-inner">
            <div class="wpb_wrapper">
                <div class="vc_empty_space hide_on_mobile" style="height: 107px;"><span class="vc_empty_space_inner"></span></div>
                <div class="sc_content sc_content_default sc_content_width_1_1 sc_float_center">
                    <div class="sc_content_container">
                        <div class="sc_layouts_item">
                            <div class="sc_layouts_title with_content with_image">
                                <div class="sc_layouts_title_content">
                                    <div class="sc_layouts_title_title">
                                        <h1 class="sc_layouts_title_caption">{{ page.title }}</h1>
                                    </div>
                                    {% if page.hero_tagline %}
                                    <div class="sc_layouts_title_breadcrumbs">
                                        <p class="la-page-hero-tagline">{{ page.hero_tagline }}</p>
                                    </div>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="vc_empty_space hide_on_mobile" style="height: 94px;"><span class="vc_empty_space_inner"></span></div>
            </div>
        </div>
    </div>
</div>
