paths:
  uploads: uploads
  static: ''
  dam_uploads: ''
  dam_static: ''
  collections: ''
  data: _data
  layouts: _layouts
  includes: _includes
collections_config:
  data:
    path: _data
    icon: notes
    output: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  posts:
    path: _posts
    icon: notes
    output: true
    create:
      path: >-
        [relative_base_path]/{date|year}-{date|month}-{date|day}-{title|slugify}.[ext]
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  pages:
    path: _pages
    icon: notes
    output: true
    filter: strict
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
collections_config_override: true
_inputs:
  categories:
    type: multiselect
    options:
      allow_create: true
      allow_empty: true
      empty_type: array
    cascade: true
  tags:
    type: multiselect
    options:
      allow_create: true
      allow_empty: true
      empty_type: array
    cascade: true
_editables:
  text:
    allow_custom_markup: true
    remove_custom_markup: false
    bold: true
    copyformatting: true
    italic: true
    link: true
    paths:
    redo: true
    removeformat: true
    strike: true
    subscript:
    superscript:
    underline: true
    undo: true
  image:
    correct_orientation: true
    expandable: true
    height: 100
    image_size_attributes: true
    mime_type:
    paths:
    resize_style: cover
    width: 100
  link:
    paths:
      uploads:
      dam_uploads:
      dam_static:
editor:
  default_path:
timezone: Etc/UTC
