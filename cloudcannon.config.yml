  cta_button:
    type: text
    label: CTA Button Label
    cascade: true
  hours_text:
    type: text
    label: Hours Text
    cascade: true
  ffl_note:
    type: textarea
    label: FFL Transfer Note
    cascade: true
  photo_strip:
    type: array
    label: Photo Strip Images
    cascade: true
  site_name:
    type: text
    label: Site Name
    cascade: true
