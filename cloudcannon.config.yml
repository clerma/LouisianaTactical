paths:
  uploads: assets/images/latact
  static: ''
  data: _data
  layouts: _layouts
  includes: _includes

# ─── Collections ──────────────────────────────────────────────────────────────
collections_config:
  pages:
    path: _pages
    output: true
    icon: article
    disable_add: false
    disable_add_folder: true
    disable_file_actions: false

collections_config_override: true

# ─── Input types ──────────────────────────────────────────────────────────────
_inputs:
  # ── Page front matter ──
  title:
    type: text
    label: Page Title
  hero_tagline:
    type: text
    label: Hero Tagline
    comment: Subtitle shown in the page banner below the title
  hero_bg:
    type: image
    label: Hero Background Photo
    options:
      paths:
        uploads: assets/images/latact
  description:
    type: textarea
    label: SEO Description
  keywords:
    type: text
    label: SEO Keywords

  # ── About page ──
  body_heading:
    type: text
    label: Heading
  body_paragraphs:
    type: array
    label: Body Paragraphs
  body_image:
    type: image
    label: Side Photo
    options:
      paths:
        uploads: assets/images/latact
  gallery_heading:
    type: text
    label: Gallery Heading
  gallery_cta:
    type: text
    label: Gallery Caption
  why_choose_heading:
    type: text
    label: Section Heading
  why_choose:
    type: array
    label: Why Choose Items

  # ── Services page ──
  page_heading:
    type: text
    label: Page Heading
  page_subheading:
    type: text
    label: Page Subheading
  product_photos:
    type: array
    label: Product Photos
  cta_bg:
    type: image
    label: CTA Background Photo
    options:
      paths:
        uploads: assets/images/latact
  cta_eyebrow:
    type: text
    label: CTA Eyebrow Text
  cta_title:
    type: text
    label: CTA Heading
  cta_description:
    type: text
    label: CTA Address
  cta_phone:
    type: text
    label: CTA Phone
  cta_button:
    type: text
    label: CTA Button Label

  # ── Contact page ──
  page_heading:
    type: text
    label: Section Heading
  hours_text:
    type: text
    label: Hours Text
  ffl_note:
    type: textarea
    label: FFL Transfer Note
  photo_strip:
    type: array
    label: Photo Strip Images

  # ── Site settings (general_settings.yml) ──
  site_name:
    type: text
    label: Site Name
  phone:
    type: text
    label: Phone Number
  email:
    type: email
    label: Email Address
  address:
    type: text
    label: Address
  site_logo_url:
    type: image
    label: Logo
  ga_id:
    type: text
    label: Google Analytics ID
    comment: Leave blank to disable

  # ── Slider (slider.yml) ──
  name:
    type: text
    label: Slide Name (internal label)
  image:
    type: image
    label: Slide Background Photo
    options:
      paths:
        uploads: assets/images/latact
  thumbnail:
    type: image
    label: Thumbnail
    options:
      paths:
        uploads: assets/images/latact
  link:
    type: url
    label: Button URL
  link_text:
    type: text
    label: Button Label
  bg_color:
    type: text
    label: Overlay Color (rgba)
    comment: "e.g. rgba(35, 30, 24, 0.82)"

  # ── Services (services.yml) ──
  icon:
    type: select
    label: Icon
    options:
      values:
        - icon-revolver
        - icon-target
        - icon-target-2
        - icon-bullet-3
        - icon-paintball
        - icon-bulletproof-vest-2

  # ── Gallery (gallery.yml) ──
  alt:
    type: text
    label: Alt Text

  # ── Navigation (site_navigation.yml) ──
  menu_title:
    type: text
    label: Menu Label
  menu_url:
    type: url
    label: URL

# ─── Array item templates ─────────────────────────────────────────────────────
_structures:
  why_choose:
    values:
      - label: Feature
        icon: article
        value:
          icon: icon-revolver
          title: ''
          description: ''

  body_paragraphs:
    values:
      - label: Paragraph
        icon: notes
        value: ''

  product_photos:
    values:
      - label: Photo
        icon: image
        value: ''

  photo_strip:
    values:
      - label: Photo
        icon: image
        value: ''

  # ── slider.yml array ──
  site_data_slider:
    values:
      - label: Slide
        icon: image
        value:
          name: New Slide
          image: ''
          thumbnail: ''
          title: ''
          text: ''
          link: /services
          link_text: Learn More
          bg_color: "rgba(35, 30, 24, 0.82)"

  # ── services.yml array ──
  site_data_services:
    values:
      - label: Service
        icon: article
        value:
          title: New Service
          icon: icon-revolver
          description: ''

  # ── gallery.yml array ──
  site_data_gallery:
    values:
      - label: Photo
        icon: image
        value:
          image: ''
          alt: LA Tactical Supply

  # ── navigation arrays ──
  site_primary_menu:
    values:
      - label: Menu Item
        icon: link
        value:
          menu_title: ''
          menu_url: /

  social:
    values:
      - label: Social Link
        icon: link
        value:
          name: ''
          link: ''
          icon: ''

# ─── Rich text editor ─────────────────────────────────────────────────────────
_editables:
  content:
    bold: true
    italic: true
    underline: true
    link: true
    bulletedlist: true
    numberedlist: true
    blockquote: true
    image: true
    undo: true
    redo: true
    removeformat: true
    copyformatting: true
    paths:
      uploads: assets/images/latact

editor:
  default_path: /
timezone: America/Chicago
