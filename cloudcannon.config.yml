    type: text
    label: Address
    cascade: true
  site_logo_url:
    type: image
    label: Logo
    cascade: true
  ga_id:
    type: text
    label: Google Analytics ID
    comment: Leave blank to disable
    cascade: true
  name:
    type: text
    label: Slide Name (internal label)
    cascade: true
  image:
    type: image
    options:
      paths:
        uploads: assets/images/latact
    label: Slide Background Photo
    cascade: true
  thumbnail:
    type: image
    options:
      paths:
        uploads: assets/images/latact
    label: Thumbnail
    cascade: true
  link:
    type: url
    label: Button URL
    cascade: true
  link_text:
    type: text
    label: Button Label
    cascade: true
  bg_color:
    type: text
    label: Overlay Color (rgba)
    comment: e.g. rgba(35, 30, 24, 0.82)
    cascade: true
  icon:
    type: select
    options:
      allow_empty: true
      values:
        - icon-revolver
        - icon-target
        - icon-target-2
        - icon-bullet-3
        - icon-paintball
        - icon-bulletproof-vest-2
